name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ['3.2', '3.3', '3.4']
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop --parallel --display-only-fail-level-error
      - name: RBS validation
        run: bundle exec rake rbs:validate
      - name: Type check (steep)
        run: bundle exec steep check --no-progress
      - name: Test
        run: bundle exec rake test
      - name: Coverage check
        run: bundle exec rake coverage
