version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      development-dependencies:
        dependency-type: development
        patterns:
          - "rubocop*"
          - "minitest"
          - "rbs"
          - "simplecov*"
      runtime-dependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
